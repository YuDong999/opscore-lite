name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            suffix: ''
          - goos: linux
            goarch: arm64
            suffix: ''
          - goos: darwin
            goarch: amd64
            suffix: ''
          - goos: darwin
            goarch: arm64
            suffix: ''
          - goos: windows
            goarch: amd64
            suffix: '.exe'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build frontend
        run: |
          cd web
          npm install
          npm run build

      - name: Build Go binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: '0'
        run: |
          go build -ldflags="-s -w" -o opscore-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.suffix }} .

      - name: Package
        run: |
          mkdir -p release/web
          cp -r web/dist release/web/dist
          if [ "${{ matrix.goos }}" = "windows" ]; then
            cp opscore-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.suffix }} release/
            cd release
            zip -r ../opscore-${{ matrix.goos }}-${{ matrix.goarch }}.zip .
          else
            cp opscore-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.suffix }} release/
            chmod +x release/opscore-${{ matrix.goos }}-${{ matrix.goarch }}
            cd release
            tar czf ../opscore-${{ matrix.goos }}-${{ matrix.goarch }}.tar.gz .
          fi

      - name: Upload artifact
        uses: softprops/action-gh-release@v2
        with:
          files: |
            opscore-${{ matrix.goos }}-${{ matrix.goarch }}.tar.gz
            opscore-${{ matrix.goos }}-${{ matrix.goarch }}.zip
          draft: false
          prerelease: false
